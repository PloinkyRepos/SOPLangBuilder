<div class="variables-table-container">
    <div class="manual-editor-header $$manualEditActiveClass">
        <div class="manual-editor-title">Manual edit</div>
        <div class="manual-edit-actions">
            <button class="general-button" data-local-action="saveManualCommands">Save &amp; Exit</button>
            <button class="general-button secondary" data-local-action="cancelManualEdit">Cancel</button>
        </div>
    </div>
    <div class="table-labels $$emptyTableClass $$manualEditHiddenClass">
        $$variablesHeader
        <div class="cell table-label table-actions">
            <div class="action-button-container pointer $$manualEditHiddenClass" data-local-action="openManualEdit" title="Edit manually" aria-label="Edit manually">
                <img class="add-buton" src="./assets/icons/angle-brackets.svg" alt="edit manually">
            </div>
            <div class="action-button-container pointer $$manualEditHiddenClass" data-local-action="openAddVariableModal" title="Add variable" aria-label="Add variable">
                <img class="add-buton" src="./assets/icons/plus.svg" alt="add">
            </div>
            <section class="default-options"></section>
        </div>
    </div>
    <div class="variables-table $$variablesTableClass">
        $$variablesHTML
    </div>
    <div class="manual-commands-editor $$manualEditorClass">
        <div class="manual-commands-label">SOPlang code</div>
        <textarea class="manual-commands-textarea" spellcheck="false"></textarea>
    </div>
</div>
