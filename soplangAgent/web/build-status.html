<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>soplangAgent build console</title>
  <link rel="stylesheet" href="build-status.css">
</head>
<body>
  <header>
    <h1>soplangAgent — Build & Variables</h1>
    <div class="sub">Monitor build status, trigger builds, and inspect variables in one place.</div>
  </header>

  <div class="page-header">
    <div class="build-page-title">Build</div>
    <div>
      <button id="execute-build">Build</button>
      <button id="sync-documents" class="primary">Sync Documents</button>
    </div>
  </div>

  <div class="build-status-strip hidden" id="build-status-strip" aria-live="polite">
    <div class="build-spinner" id="build-spinner" aria-hidden="true"></div>
    <div class="build-status-copy">
      <div class="build-status-title" id="build-status-title">Idle</div>
      <div class="build-status-detail" id="build-status-detail">No build running.</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="errors">Build Errors</div>
    <div class="tab" data-tab="logs">Live Logs</div>
    <div class="tab" data-tab="vars">Variables</div>
  </div>

  <div class="page-body">
    <section class="panel tab-content" data-content="errors">
      <div class="errors-list" id="errors-body">No errors</div>
    </section>

    <section class="panel tab-content hidden" data-content="logs" aria-live="polite">
      <div class="logs-title">
        <span>Live logs</span>
        <div class="logs-copy-wrap">
          <span id="copy-live-logs-toast" class="logs-copy-toast" role="status" aria-live="polite">Copied!</span>
          <button id="copy-live-logs" class="logs-copy-btn" type="button" aria-label="Copy live logs" title="Copy live logs">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <rect x="9" y="9" width="10" height="10" rx="2"></rect>
              <path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
            </svg>
          </button>
        </div>
      </div>
      <pre id="build-live-log" class="build-live-log">No logs yet.</pre>
    </section>

    <section class="panel tab-content hidden" data-content="vars">
      <div class="vars-toolbar">
        <label class="toggle">
          <input type="checkbox" id="show-all-vars">
          <span>Show all variables</span>
        </label>
      </div>
      <table class="vars-table">
        <thead>
          <tr>
            <th>Status</th>
            <th>Variable</th>
            <th>Document</th>
            <th>Value</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="vars-body">
          <tr><td colspan="5" class="table-message">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <div class="modal-backdrop" id="var-modal">
    <div class="modal">
      <div class="modal-header-row">
        <h3 id="var-modal-title">Variable</h3>
        <span class="close" data-action="close-modal">&#x2715;</span>
      </div>
      <textarea id="var-modal-body" class="modal-textarea" readonly wrap="off">—</textarea>
    </div>
  </div>

  <script type="module">
    import { createAgentClient } from '/MCPBrowserClient.js';
    window.createAgentClient = createAgentClient;
  </script>
  <script type="module" src="build-status.js"></script>

</body>
</html>
